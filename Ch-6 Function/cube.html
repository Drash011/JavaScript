<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube</title>
</head>

<body>

    <h1>Cube of Number</h1>

    <script>

        function cube() {

            let n = +prompt("Enter any number: ");
            return n * n * n;

        }

        let result = cube();

        console.log("Cube:", result);
        document.write("Cube: " + result);

    </script>
</body>

</html>
