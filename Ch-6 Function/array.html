<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of Array</title>
</head>

<body>

    <h1>Sum of 1D Array</h1>

    <script>

        function sumArray(arr, size) {

            let sum = 0;

            for (let i = 0; i < size; i++) {
                sum += arr[i];
            }

            return sum;
        }

        let size = +prompt("Enter array size:");

        let arr = [];

        for (let i = 0; i < size; i++) {
            arr[i] = +prompt("Enter a[" + i + "] :");
        }

        let result = sumArray(arr, size);

        console.log("The sum of an Array :", result);
        document.write("The sum of an Array : " + result);

    </script>

</body>

</html>
