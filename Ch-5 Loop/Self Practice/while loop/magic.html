<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGIC NUMBER</title>
</head>

<body>

    <h1>Magic Number</h1>

    <script>

        let n = +prompt("Enter any number :");

        let sum, rem;

        while (n > 9) {
            sum = 0;

            while (n != 0) {
                rem = n % 10;
                sum = sum + rem;
                n = Math.floor(n / 10);
            }

            n = sum;
        }

        if (n == 1) {
            console.log("\nThis is Magic Number");
            document.write("\nThis is Magic Number");
        }
        else {
            console.log("\nThis is Not a Magic Number");
            document.write("\nThis is Not a Magic Number");
        }
    </script>

</body>

</html>
