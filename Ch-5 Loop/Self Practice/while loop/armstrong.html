<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARMSTRONG NUMBER</title>
</head>

<body>

    <h1>Armstrong Number</h1>

    <script>

        let n = +prompt("\nEnter any Number :");

        let arm = n;
        let rem, sum = 0;

        while (n !== 0) {
            rem = n % 10;
            sum = sum + (rem * rem * rem);
            n = Math.floor(n / 10);
        }

        console.log("\nSum: %d", sum);

        if (arm === sum) {
            console.log("\nThis is Armstrong Number");
            document.write("\nThis is Armstrong Number");
        }
        else {
            console.log("\nThis is Not an Armstrong Number");
            document.write("\nThis is Not an Armstrong Number");
        }

    </script>

</body>

</html>
