<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTIPICATION</title>
</head>

<body>

    <h1>Multipication of NUmbers</h1>

    <script>
        
        let n = +prompt("Enter any Number :");
        
        let i = 1, multi = 1;

        do {
            multi = multi * i;
            i++;
        } while (i <= n);

        console.log("Multipication: ", multi);
        document.write("Multipication: ", multi);

    </script>

</body>

</html>
