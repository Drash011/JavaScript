<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVERSE NUMBER</title>
</head>

<body>

    <h1>Reverse Number</h1>

    <script>
        
        let n = +prompt("Enter any Number :");
        console.log("Number: ", n);
        document.write("Number: ", n);

        let rem, rev = 0;
        do {
            rem = n % 10;
            rev = rev * 10 + rem;
            n = Math.floor(n / 10);
        } while (n != 0);

        console.log("Reverse: ", rev);
        document.write("<br>Reverse: ", rev);
    </script>

</body>

</html>
