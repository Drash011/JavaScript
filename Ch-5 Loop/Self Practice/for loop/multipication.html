<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTIPICATION</title>
</head>

<body>

    <h1>Multipication of Numbers</h1>

    <script>
        
        let n = +prompt("Enter any Number :");
        
        let multi = 1;
        for (let i = 1; i <= n; i++) {
            multi = multi * i;
        }

        console.log("Multipication: ", multi);
        document.write("Multipication: ", multi);
    </script>

</body>

</html>
